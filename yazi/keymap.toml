# Since Yazi selects the first matching key to run, prepend always has a higher priority than default,
# and append always has a lower priority than default:
[mgr]
prepend_keymap = [
    # zoxide and fzf
	{ on = "Z", run = "plugin fzf", desc = "Jump to a file/directory via fzf" },
	{ on = "z", run = "plugin zoxide", desc = "Jump to a directory via zoxide" },
    # tabs
	{ on = ["t", "n"], run = "tab_create --current", desc = "Create a new tab with CWD" },
	{ on = ["t", "j"], run = "tab_switch -1 --relative", desc = "Switch to previous tab" },
	{ on = ["t", "k"], run = "tab_switch 1 --relative",  desc = "Switch to next tab" },
	{ on = ["t", "h"], run = "tab_swap -1", desc = "Swap current tab with previous tab" },
	{ on = ["t", "l"], run = "tab_swap 1",  desc = "Swap current tab with next tab" },
	{ on = ["t", "q"], run = "close", desc = "Close the current tab, or quit if it's last" },
]
